name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"
          cache: gradle

      - uses: gradle/actions/setup-gradle@v3

      - run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintRelease
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-release.html

  # ── Job 2: Unit Tests ────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"
          cache: gradle

      - uses: gradle/actions/setup-gradle@v3

      - run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testReleaseUnitTest
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/testReleaseUnitTest/

  # ── Job 3: Deploy (only on main, only after lint+test pass) ──────────────
  deploy:
    name: Deploy to Play Store (Internal)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"
          cache: gradle

      - uses: gradle/actions/setup-gradle@v3

      - run: chmod +x gradlew

      - name: Build Release Bundle
        run: ./gradlew bundleRelease
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Sign Bundle
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Play Store (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.clockweather.app
          releaseFiles: ${{ steps.sign_app.outputs.signedReleaseFile }}
          mappingFile: app/build/outputs/mapping/release/mapping.txt
          track: internal

      - name: Create Git Tag on Success
        if: success()
        run: |
          VERSION_MAJOR=$(grep 'VERSION_MAJOR' gradle.properties | cut -d'=' -f2)
          VERSION_MINOR=$(grep 'VERSION_MINOR' gradle.properties | cut -d'=' -f2)
          TAG_NAME="v$VERSION_MAJOR.$VERSION_MINOR.${{ github.run_number }}"
          git tag $TAG_NAME
          git push origin $TAG_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
