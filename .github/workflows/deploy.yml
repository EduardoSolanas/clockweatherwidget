name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"
          cache: gradle

      - uses: gradle/actions/setup-gradle@v3

      - run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintRelease
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          GOOGLE_WEATHER_API_KEY: ${{ secrets.GOOGLE_WEATHER_API_KEY }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-release.html

  # ── Job 2: Unit Tests ────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"
          cache: gradle

      - uses: gradle/actions/setup-gradle@v3

      - run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testReleaseUnitTest
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          GOOGLE_WEATHER_API_KEY: ${{ secrets.GOOGLE_WEATHER_API_KEY }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/testReleaseUnitTest/

  # ── Job 3: Deploy (only on main, only after lint+test pass) ──────────────
  deploy:
    name: Deploy to Play Store (Internal)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"
          cache: gradle

      - uses: gradle/actions/setup-gradle@v3

      - run: chmod +x gradlew

      - name: Auto-increment Version Patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          old_patch=$(grep '^VERSION_PATCH=' gradle.properties | cut -d'=' -f2 | tr -d '\r')
          new_patch=$((old_patch + 1))
          sed -i "s/^VERSION_PATCH=.*/VERSION_PATCH=$new_patch/" gradle.properties
          
          git add gradle.properties
          git commit -m "chore: bump version to $new_patch [skip ci]"
          
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
          
          VERSION_MAJOR=$(grep '^VERSION_MAJOR=' gradle.properties | cut -d'=' -f2 | tr -d '\r')
          VERSION_MINOR=$(grep '^VERSION_MINOR=' gradle.properties | cut -d'=' -f2 | tr -d '\r')
          echo "VERSION_NAME=$VERSION_MAJOR.$VERSION_MINOR.$new_patch" >> $GITHUB_ENV

      - name: Build Release Bundle
        run: ./gradlew bundleRelease
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          GOOGLE_WEATHER_API_KEY: ${{ secrets.GOOGLE_WEATHER_API_KEY }}
          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Sign Bundle
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Play Store (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.clockweather.app
          releaseFiles: ${{ steps.sign_app.outputs.signedReleaseFile }}
          mappingFile: app/build/outputs/mapping/release/mapping.txt
          tracks: internal
          status: draft
          releaseName: ${{ env.VERSION_NAME }}

      - name: Create Git Tag on Success
        if: success()
        run: |
          TAG_NAME="v${{ env.VERSION_NAME }}"
          
          echo "========================================================="
          echo "SUCCESSFULLY PUBLISHED TO GOOGLE PLAY CONSOLE (INTERNAL)"
          echo "   Created Google Play Release Version: ${{ env.VERSION_NAME }}"
          echo "   Created Git Tag:                     $TAG_NAME"
          echo "========================================================="
          
          git tag $TAG_NAME
          git push origin $TAG_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
